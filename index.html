<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no"/>
        <meta name="renderer" content="webkit"/>
        <meta name="force-rendering" content="webkit"/>
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
        <title id="title">Acdp</title>
        <style>
            .element::-webkit-scrollbar { width: 0 !important }
            .element { -ms-overflow-style: none; }
            .element { overflow: -moz-scrollbars-none; }
        </style>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/mdui@1.0.1/dist/css/mdui.min.css"
            integrity="sha384-cLRrMq39HOZdvE0j6yBojO4+1PrHfB7a9l5qLcmRm/fiWXYY+CndJPmyu5FV/9Tw"
            crossorigin="anonymous"
        />
        <script src="https://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
    </head>
    <body id="body" class="mdui-appbar-with-toolbar mdui-drawer-body-left">

        <div class="mdui-appbar mdui-appbar-fixed mdui-shadow-0">
            <div class="mdui-toolbar mdui-color-white">
                <a href="javascript:;" class="mdui-btn mdui-ripple mdui-btn-icon" mdui-drawer="{target: '#drawer'}"><i class="mdui-icon material-icons">menu</i></a>
                <a href="javascript:;" class="mdui-typo-headline">Acdp</a>
                <a href="javascript:;" class="mdui-typo-title" id="f-title">Start</a>
                <div class="mdui-toolbar-spacer"></div>
                <a href="javascript:;" class="mdui-btn mdui-ripple mdui-btn-icon mdui-hidden-xs"><i class="mdui-icon material-icons">search</i></a>
                <a href="javascript:;" class="mdui-btn mdui-ripple mdui-btn-icon" onclick="GetReadme(NowPage)"><i class="mdui-icon material-icons">refresh</i></a>
                <a href="javascript:;" class="mdui-btn mdui-ripple mdui-btn-icon"><i class="mdui-icon material-icons">more_vert</i></a>
            </div>
        </div>

        <div class="mdui-drawer" id="drawer">
            <ul class="mdui-list" mdui-collapse="{accordion: true}" id="dc">

                <li class="mdui-list-item mdui-ripple mdui-list-item-active" id="Start" onclick="Active('https://acdp.top/Crud.md', id);">
                    <i class="mdui-list-item-icon mdui-icon material-icons mdui-text-color-blue">home</i>
                    <div class="mdui-list-item-content">Home</div>
                </li>

                <li class="mdui-collapse-item" id="d-bran">
                    <div class="mdui-collapse-item-header mdui-list-item mdui-ripple">
                        <i class="mdui-list-item-icon mdui-icon material-icons mdui-text-color-deep-orange">layers</i>
                        <div class="mdui-list-item-content">Projects</div>
                        <i class="mdui-collapse-item-arrow mdui-icon material-icons">keyboard_arrow_down</i>
                    </div>
                    <ul class="mdui-collapse-item-body mdui-list mdui-list-dense">
                        <li class="mdui-list-item mdui-ripple" id="Repository" onclick="Active('https://acdp.top/', id);">Acdp</li>
                        <li class="mdui-list-item mdui-ripple" id="SNS" onclick="Active('https://acdp.top/SNS/Crud.md', id);">Network System</li>
                        <li class="mdui-list-item mdui-ripple" id="AUT" onclick="Active('https://acdp.top/AUT/Crud.md', id);">AUT</li>
                    </ul>
                </li>

                <li class="mdui-collapse-item" id="d-bran">
                    <div class="mdui-collapse-item-header mdui-list-item mdui-ripple">
                        <i class="mdui-list-item-icon mdui-icon material-icons mdui-text-color-purple">book</i>
                        <div class="mdui-list-item-content">Blog</div>
                        <i class="mdui-collapse-item-arrow mdui-icon material-icons">keyboard_arrow_down</i>
                    </div>
                    <ul class="mdui-collapse-item-body mdui-list mdui-list-dense">
                        <li class="mdui-list-item mdui-ripple" id="Blog" onclick="Active('https://acdp.top/', id);">Acdp</li>
                    </ul>
                </li>

                <li class="mdui-list-item mdui-ripple" id="About" onclick="Active('https://acdp.top/A03HCY/Crud.md', id, false);">
                    <i class="mdui-list-item-icon mdui-icon material-icons mdui-text-color-green">insert_emoticon</i>
                    <div class="mdui-list-item-content">About Me</div>
                </li>

            </ul>
        </div>
        
        <article class="mdui-typo mdui-container mdui-m-t-3 doc-container">
        </article>
        <div class="mdui-container doc-container" id="divx">
        </div>
        <audio id="hidden" src="https://acdp.top/A03HCY/hidden.mp3" loop="true" hidden="true">
        </audio>

        </div>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://unpkg.com/current-device/umd/current-device.min.js"></script>
        <script src="https://acdp.top/func.js"></script>
        <script src="https://acdp.top/cookies.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/mdui@1.0.1/dist/js/mdui.min.js"
            integrity="sha384-gCMZcshYKOGRX9r6wbDrvF+TcCCswSHFucUzUPwka+Gr+uHgjlYvkABr95TCOz3A"
            crossorigin="anonymous"
        ></script>
        <script>
            var NowPage = 'https://acdp.top/Crud.md';
            function GetReadme(FN) {
                NowPage = FN;
                document.getElementById("divx").html("");
                mdui.$('article').html(
                    '<div class="mdui-text-center"><div class="mdui-spinner mdui-spinner-colorful"></div></div>'
                );
                mdui.mutation();
                var xmlhttp;
                if (window.XMLHttpRequest) {
                    xmlhttp = new XMLHttpRequest();
                } else {
                    xmlhttp = new ActiveXObject('Microsoft.XMLHttp');
                }
                xmlhttp.onreadystatechange = function() {
                    if(xmlhttp.readyState == 4 && xmlhttp.status == 200) {
                        mdui.$('article').html(
                            marked(xmlhttp.responseText)
                        );
                    }
                }
                xmlhttp.open('GET', FN+"?timestamp="+new Date().getTime(), true);
                xmlhttp.send();
            }
            function Active(FN, id) {
                var oli = document.getElementsByTagName("li");
                for(var i=0; i<oli.length; i++){
                    if (oli[i].id == "d-bran"){
                        continue;
                    }
                    oli[i].setAttribute("class","mdui-list-item mdui-ripple");
                    if (oli[i].id == id){
                        oli[i].setAttribute("class","mdui-list-item mdui-ripple mdui-list-item-active");
                        mdui.mutation();
                    }
                };
                document.getElementById("f-title").innerHTML=id
                document.getElementById("title").innerHTML="Acdp | "+id
                GetReadme(FN);
                SetCookie("page", id, 15)
            }
            $(document).ready(function(){
                StartEnvir();
                if(GetCookie("page") != "") {
                    document.getElementById(GetCookie("page")).click();
                } else {
                    document.getElementById("Start").click();
                }
                document.getElementById("hidden").volume = 0.15;
                mdui.snackbar({
                    message: "Welcome Here",
                    position: 'right-bottom'
                });
                if(GetCookie("hidden") != "true"){
                    mdui.snackbar({
                        message: '开启背景音乐?',
                        buttonText: 'OK',
                        onButtonClick: function(){
                            SetCookie("hidden", "true", 15)
                            document.getElementById("hidden").play();
                        }
                    });
                } else {
                    document.getElementById("hidden").play();
                    mdui.snackbar({
                        message: '关闭背景音乐?',
                        buttonText: 'OK',
                        onButtonClick: function(){
                            document.getElementById("hidden").pause();
                            SetCookie("hidden", "false", 15)
                        }
                    });
                }
            });
        </script>
    </body>
</html>
