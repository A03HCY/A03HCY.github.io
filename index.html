<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Acdp</title>
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/mdui@1.0.1/dist/css/mdui.min.css"
    integrity="sha384-cLRrMq39HOZdvE0j6yBojO4+1PrHfB7a9l5qLcmRm/fiWXYY+CndJPmyu5FV/9Tw"
    crossorigin="anonymous"
    />
    <style>
        #computer{
            display:block;
            width:100%;
            height:200px;
            object-fit:cover
        }
        #phone{
            display:block;
            width:100%;
            height:150px;
            object-fit:cover
        }
    </style>
</head>

<body>

<div class="mdui-grid-tile mdui-m-b-2">
    <a class="mdui-hidden-xs-down" href="javascript:;"><img id="computer" src="https://acdp.top/background/01.png"/></a>
    <a class="mdui-hidden-sm-up" href="javascript:;"><img id="phone" src="https://acdp.top/background/01.png"/></a>
    <div class="mdui-grid-tile-actions mdui-grid-tile-actions-top mdui-grid-tile-actions-transparent">
      <div class="mdui-toolbar">
        <a href="javascript:;" class="mdui-btn mdui-btn-icon"><i class="mdui-icon material-icons">menu</i></a>
        <span class="mdui-typo-title mdui-hidden-xs">Home</span>
        <div class="mdui-toolbar-spacer"></div>
        <span class="mdui-typo-title">Aiden's Blog</span>
        <div class="mdui-toolbar-spacer"></div>
        <a href="javascript:;" class="mdui-btn mdui-btn-icon mdui-hidden-xs"><i class="mdui-icon material-icons">search</i></a>
        <a href="javascript:;" class="mdui-btn mdui-btn-icon mdui-hidden-xs"><i class="mdui-icon material-icons">refresh</i></a>
        <a href="javascript:;" class="mdui-btn mdui-btn-icon"><i class="mdui-icon material-icons">more_vert</i></a>
      </div>
    </div>
    <div class="mdui-grid-tile-actions mdui-grid-tile-actions-transparent">
      <div class="mdui-grid-tile-text mdui-m-l-2">
        <div class="mdui-grid-tile-title" id="jinrishici-sentence"></div>
      </div>
    </div>
</div>

<div class="mdui-container">
    <div class="mdui-row">
        <div class="mdui-col-xs-12 mdui-col-sm-7 mdui-col-md-8">
            <div class="mdui-card mdui-m-b-2">
                <div class="mdui-card-media">
                  <img src="https://area.sinaapp.com/bingImg"/>
                  <div class="mdui-card-media-covered mdui-card-media-covered-transparent">
                    <div class="mdui-card-primary">
                      <div class="mdui-card-primary-title">Title</div>
                      <div class="mdui-card-primary-subtitle">Subtitle</div>
                    </div>
                  </div>
                </div>
              </div>
        </div>
        <div class="mdui-col-xs-12 mdui-col-sm-5 mdui-col-md-4">
            <div class="mdui-card mdui-m-b-2">
                <div class="mdui-card-media">
                  <img src="https://area.sinaapp.com/bingImg"/>
                  <div class="mdui-card-media-covered mdui-card-media-covered-transparent">
                    <div class="mdui-card-primary">
                      <div class="mdui-card-primary-title">Title</div>
                      <div class="mdui-card-primary-subtitle">Subtitle</div>
                    </div>
                  </div>
                </div>
              </div>
        </div>
    </div>
</div>

<script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>
<script
    src="https://cdn.jsdelivr.net/npm/mdui@1.0.1/dist/js/mdui.min.js"
    integrity="sha384-gCMZcshYKOGRX9r6wbDrvF+TcCCswSHFucUzUPwka+Gr+uHgjlYvkABr95TCOz3A"
    crossorigin="anonymous"
></script>
</body>
</html>
