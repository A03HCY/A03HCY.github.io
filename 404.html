<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no"/>
        <meta name="renderer" content="webkit"/>
        <meta name="force-rendering" content="webkit"/>
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
        <title id="title">Acdp</title>
        <style>
            .element::-webkit-scrollbar { width: 0 !important }
            .element { -ms-overflow-style: none; }
            .element { overflow: -moz-scrollbars-none; }
        </style>
    </head>
    <body>
        <div id="io"></div>
        <script src="https://acdp.top/cookies.js"></script>
        <script>
            var url = window.location.pathname;
            url = url.split("/").slice(1);
            var url = url.filter(function (s) {
                return s && s.trim();
            })
            document.getElementById("title").innerText = url[0];
            document.getElementById("io").innerText = url;
            var stop = false;
            var xmlhttp, result;
            if (window.XMLHttpRequest) {
                xmlhttp = new XMLHttpRequest();
            } else {
                xmlhttp = new ActiveXObject('Microsoft.XMLHttp');
            }
            xmlhttp.onreadystatechange = function() {
                if(xmlhttp.readyState == 4 && xmlhttp.status == 200) {
                    var project = xmlhttp.responseText.split(",");
                    result = project.findIndex(ele => ele === url[0])
                    if (result == -1){
                        stop = true;
                    }
                }
            }
            xmlhttp.open('GET', "/deep/project.cot", true);
            xmlhttp.send();
            if (stop == false){
                SetCookie("jump", url);
                window.location.href="/";
            } else [
                DeleteCookie("jump")
            ]
        </script>
    </body>
</html>
